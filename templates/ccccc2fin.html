{% extends "base.html" %}
{% block content %}
<style>
  .ranking-form-wrapper {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px);
    padding: 20px;
    overflow: hidden;
  }

  .ranking-form-wrapper video.bg-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 1;
  }

  form {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 25px 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 550px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #ffffff;
    font-size: 22px;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #ffffff;
    font-size: 14px;
  }

  input[type="text"],
  textarea,
  input[type="file"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 14px;
    background-color: rgba(255, 255, 255, 0.8);
    color: #000;
  }

  textarea::placeholder {
    color: #666;
  }

  button {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: bold;
    background-color: #009688;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  button:hover {
    background-color: #00796b;
  }

  /* Loading Spinner */
  .loading-spinner {
    position: absolute;
    z-index: 2;
    width: 60px;
    height: 60px;
    border: 6px solid rgba(255, 255, 255, 0.4);
    border-top: 6px solid #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  table {
    border-collapse: collapse;
    width: 95%;
    margin: auto;
    background-color: white;
    z-index: 1;
    position: relative;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
  }

  th {
    background-color: #009688;
    color: white;
  }

  .download-box {
    margin-top: 30px;
    text-align: center;
    z-index: 1;
    position: relative;
  }

  .download-link {
    background-color: #00796B;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
  }

  .download-link:hover {
    background-color: #004D40;
  }
</style>

<div class="ranking-form-wrapper">
  <!-- Background Video -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="{{ url_for('static', filename='vv.mp4') }}" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Spinner -->
  <div id="spinner" class="loading-spinner"></div>

  <!-- Form -->
  <form id="ranking-form" method="post" action="/ranking" enctype="multipart/form-data">
    <h2>Patent Relevance Ranking Tool</h2>
    <label for="project_code">Project Code:</label>
    <input type="text" id="project_code" name="project_code" readonly>

    <label for="abstract">Abstract:</label>
    <textarea name="abstract" id="abstract" rows="5" placeholder="Paste abstract here..." required></textarea>

    <label for="initial_file">Initial Dataset (.xlsx):</label>
    <input type="file" name="initial_file" id="initial_file" accept=".xlsx" required>

    <label for="final_file">Final Dataset (.xlsx):</label>
    <input type="file" name="final_file" id="final_file" accept=".xlsx" onchange="extractProjectCode()" required>

    <button type="submit">EXECUTE RANKING</button>
  </form>

  {% if table_html %}
    <h2>Final Rank Order Output</h2>
    {{ table_html | safe }}
    <div class="download-box">
      <a href="/download/{{ file_token }}" class="download-link" download>Download Ranking Results (.zip)</a>
    </div>
  {% endif %}
</div>

<script>
  function extractProjectCode() {
    const fileInput = document.getElementById("final_file");
    const projCodeField = document.getElementById("project_code");
    if (fileInput.files.length > 0) {
      const filename = fileInput.files[0].name;
      const code = filename.split("_")[0];
      projCodeField.value = code;
    }
  }

  document.getElementById("ranking-form")?.addEventListener("submit", function (e) {
    const spinner = document.getElementById("spinner");
    spinner.style.display = "block";
  });
</script>
{% endblock %}
