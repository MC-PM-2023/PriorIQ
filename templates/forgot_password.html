<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            /* The image is the background for the whole page */
            background-image: url('/static/ano.jpg'); /* Ensure this image exists */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            height: 100vh;
            /* Centers the content vertically and horizontally */
            display: flex; 
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white; /* Changed text color to white for the dark background */
        }
        .container {
            /* Remove absolute positioning and right/transform */
            /* position: absolute; */
            /* top: 50%; */
            /* right: 10%; */
            /* transform: translateY(-50%); */
            
            /* Styles to match the login page (dark background, centered) */
            background: rgba(30, 15, 45, 0.8); /* Dark purple/black with transparency */
            padding: 40px 30px; /* Increased padding slightly */
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); /* Stronger shadow for effect */
            width: 100%;
            max-width: 350px; /* Adjusted max-width for a compact look */
            text-align: center;
            box-sizing: border-box; /* Includes padding and border in the element's total width and height */
        }
        h2 {
            color: white; /* Changed heading color to a bright yellow/gold to stand out */
            margin-bottom: 25px;
            font-size: 24px;
        }
        form {
            margin-top: 10px;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px; /* Slightly more padding */
            margin-bottom: 20px;
            border: 1px solid #ffcc00; /* Border color matching the button hover/text */
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.9); /* Slight white background for input */
            color: #333; /* Dark text inside input */
        }
        button {
            /* Color matching the login button's yellow/gold */
            background: #ffcc00; 
            color: #333; /* Dark text for button */
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }
        button:hover {
            /* Hover color for a slightly darker gold or a related bright color */
            background: #ffa500; /* Orange/Gold hover */
        }
        p {
            font-size: 14px;
            color: #ff6347; /* Error text in a bright red */
            margin-top: 10px;
        }
        .back-to-login {
            margin-top: 25px;
            font-size: 14px;
        }
        .back-to-login a {
            color: #ffcc00; /* Link color to match the theme */
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .back-to-login a:hover {
            color: #ffa500; /* Link hover color */
        }
        
    </style>
</head>
<body>
    <div class="container">
        <h2>Forgot Password</h2>
        <form method="POST" action="/forgot-password">
            <input type="email" name="email" placeholder="Enter your registered email" required>
            <button type="submit">Send OTP</button>
            {% if error %}
                <p>{{ error }}</p>
            {% endif %}
        </form>
        <div class="back-to-login">
            <a href="/login">Back to Login</a> 
        </div>
    </div>
</body>
</html>
