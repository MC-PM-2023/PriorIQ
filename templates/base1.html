<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PriorIQ</title>
  <link rel="icon" href="{{ url_for('static', filename='PriorIQ Icon.png') }}" type="image/x-icon">
  <style>
    :root{
      --sidebar-w: 200px;           /* sidebar width */
      --topbar-h: 56px;             /* header height (auto-updated by JS) */

      --sidebar-bg: #1c3c54;
      --sidebar-hover: #007bff;
      --active-bg: rgba(255, 255, 255, 0.15);
      --logout-color: #dc3545;
      --logout-hover: #c82333;

      --icon-dashboard: #ffc107; /* Amber */
      --icon-initial: #20c997;   /* Teal  */
      --icon-final: #007bff;     /* Blue  */
      --icon-sql: #dc3545;       /* Red   */
      --icon-rating: #f97316;    /* Orange */
      --icon-result: #8b5cf6;    /* Violet */
    }

    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body { display: flex; }

    /* ========= SIDEBAR (fixed) ========= */
    .sidebar {
      width: var(--sidebar-w); height: 100vh;
      position: fixed; top: 0; left: 0;
      background: var(--sidebar-bg);
      padding: 18px 10px 14px;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: 2px 0 12px rgba(0,0,0,.25);
      border-right: 1px solid rgba(255,255,255,.08);
      z-index: 1100; overflow-y: auto;
    }
    .sidebar::before {
      content:""; position:absolute; inset:0 auto 0 0; width:3px;
      background: linear-gradient(180deg,#0ea5e9,#22d3ee);
      box-shadow: 0 0 12px rgba(14,165,233,.55);
    }

    .nav-label {
      padding: 6px 12px 10px 18px;
      color: #cfe7ff; letter-spacing:.2px; font-weight:700;
      text-transform: uppercase; font-size: 12px; opacity:.8;
    }

    .sidebar a {
      --accent: #fbbf24;
      display:flex; align-items:center; gap:12px;
      color:#fff; text-decoration:none;
      padding:12px 14px 12px 18px;
      border-radius:12px; position:relative;
      transition: transform .15s ease, background .2s ease;
      font-size:16px; font-weight:600;
    }
    .sidebar a i {
      font-style:normal; font-weight:900;
      min-width:24px; text-align:center;
    }
    .sidebar a::before {
      content:""; position:absolute; left:6px; top:10px; bottom:10px; width:4px;
      background: linear-gradient(180deg,var(--accent),transparent);
      border-radius:6px; opacity:.75; transition: opacity .2s, transform .2s;
    }
    .sidebar a:hover { background:#1f4a64; transform: translateX(2px); }
    .sidebar a:hover::before { opacity:1; transform: scaleX(1.05); }

    .sidebar a.active {
      background: var(--active-bg);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .sidebar a.active::after {
      content:""; position:absolute; left:-2px; top:8px; bottom:8px; width:6px;
      background: linear-gradient(180deg,#0ea5e9,#22d3ee);
      border-radius:10px; box-shadow:0 0 12px rgba(14,165,233,.6);
    }

    /* per-item accent mapping */
    .sidebar a:nth-child(2){ --accent:#fbbf24; } /* Dashboard */
    .sidebar a:nth-child(2) i{ color: var(--icon-dashboard); }

    .sidebar a:nth-child(3){ --accent:#10b981; } /* Initial */
    .sidebar a:nth-child(3) i{ color: var(--icon-initial); }

    .sidebar a:nth-child(4){ --accent:#60a5fa; } /* Final */
    .sidebar a:nth-child(4) i{ color: var(--icon-final); }

    .sidebar a:nth-child(5){ --accent:#ef4444; } /* SQL Search */
    .sidebar a:nth-child(5) i{ color: var(--icon-sql); }

    .sidebar a:nth-child(6){ --accent:#f97316; } /* Rating */
    .sidebar a:nth-child(6) i{ color: var(--icon-rating); }

    .sidebar a:nth-child(7){ --accent:#8b5cf6; } /* Result */
    .sidebar a:nth-child(7) i{ color: var(--icon-result); }

    /* ========= MAIN WRAP ========= */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; display: flex; flex-direction: column;
      min-height: 100vh; width: calc(100% - var(--sidebar-w));
    }

    /* ========= STICKY/FIXED HEADER ========= */
    .header {
      position: fixed;                         /* make it really sticky */
      top: 0;
      left: var(--sidebar-w);                  /* sit next to sidebar */
      right: 0;                                /* stretch to right edge */
      height: auto;                            /* height adapts to content/logo */
      background-color: #ffffff;
      padding: 10px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #ddd;
      z-index: 1500;                           /* above table/filters */
    }
    /* space below fixed header so content doesn't slide under it */
    .content {
      flex:1;
      padding: 0;
      margin: 0;
      padding-top: var(--topbar-h);            /* 🟢 critical offset */
      overflow: visible;
    }

    .header .center { font-size: 20px; font-weight: bold; }
    img.logo { height: 40px; }
    .profile { position: relative; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .profile img { height:36px; border-radius:50%; border:2px solid #ddd; }
    .username-display { color:#333; font-weight:600; font-size:16px; }

    .dropdown-content {
      display:none; position:absolute; top:100%; right:0; margin-top:5px;
      background:#fff; min-width:150px; border-radius:6px; overflow:hidden;
      box-shadow:0 4px 12px rgba(0,0,0,.15); z-index:2000;
    }
    .dropdown-content a{ color:#333; padding:12px 15px; display:block; text-decoration:none; transition: background-color .2s; }
    .dropdown-content a:hover{ background-color:#f8f9fa; }
    .profile:hover .dropdown-content{ display:block; }

    .dropdown-content a.logout-btn{
      background-color: var(--logout-color); color:#fff; text-align:center; font-weight:600;
    }
    .dropdown-content a.logout-btn:hover{ background-color: var(--logout-hover); }

    /* ========= RESPONSIVE ========= */
    @media (max-width:768px){
      .sidebar{ width:0; padding:0; overflow:hidden; }
      .main{ margin-left:0; width:100vw; }
      .header{
        left: 0;                               /* full width when sidebar hidden */
        right: 0;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="nav-label">Navigation</div>
    <a href="{{ url_for('dashboard') }}"><i>[ ]</i> Dashboard</a>
    <a href="{{ url_for('page_a') }}"><i>Ξ</i> Initial</a>
    <a href="{{ url_for('page_b') }}"><i>Δ</i> Final</a>
    <a href="{{ url_for('page_c') }}"><i>~#</i> SQL Search</a>
    <a href="{{ url_for('rating') }}"><i>★</i> Rating</a>
    <a href="{{ url_for('result') }}"><i>⊕</i> Result</a>
    <a href="{{ url_for('logs') }}"><i>≣</i> Logs</a>
  </div>

  <div class="main">
    <!-- FIXED/STICKY HEADER -->
    <div class="header">
      <img src="{{ url_for('static', filename='wh.jpg') }}" class="logo" alt="logo">
      <div style="flex: 1;"></div>
      <div class="profile">
        <span class="username-display">{{ session.get('username', 'piriskillal') }}</span>
        <img src="{{ url_for('static', filename='ddf.png') }}" alt="Profile">
        <div class="dropdown-content">
          <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
        </div>
      </div>
    </div>

    <!-- PAGE CONTENT (pushed down by header height) -->
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>

  <script>
    // Disable right-click & some dev keys (as in your original)
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e){
      if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "C" || e.key === "J")) ||
        (e.ctrlKey && e.key === "U")
      ){ e.preventDefault(); return false; }
    };

    // Auto-calc header height → set --topbar-h so content offset is always correct
    function setTopbarHeight(){
      const header = document.querySelector('.header');
      if(!header) return;
      const h = header.getBoundingClientRect().height || 56;
      document.documentElement.style.setProperty('--topbar-h', h + 'px');
    }
    window.addEventListener('load', setTopbarHeight);
    window.addEventListener('resize', setTopbarHeight);
    setTimeout(setTopbarHeight, 250); // in case logo loads a bit later
  </script>
</body>
</html>
