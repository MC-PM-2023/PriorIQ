{% extends "base.html" %}
{% block content %}
<style>
  :root {
    --blue-gradient: linear-gradient(to right, #00c6ff, #0072ff);
    --hover-gradient: linear-gradient(to right, #00f0ff, #00c6ff);
    --glow: 0 0 14px rgba(0, 198, 255, 0.25);
    --form-bg: rgba(8, 12, 24, 0.75);
    --border: 1px solid rgba(0, 255, 255, 0.1);
    --text-color: #cceeff;
    --input-bg: rgba(0, 0, 0, 0.45);
    
    /* Neon Colors */
    --neon-blue: #00ffff;
    --neon-purple: #9d00ff;
    --neon-glow-shadow: 0 0 15px var(--neon-blue);
    
    /* Sidebar and Header values */
    --sidebar-width: 200px; 
    --header-height: 65px; 
  }

  * {
    user-select: none;
    box-sizing: border-box;
  }
  
  ::selection {
    background: transparent;
    color: inherit;
  }

  /* --- Layout and Form Styles (Retained for no-scroll fit) --- */
  .ranking-form-wrapper {
    position: relative;
    width: 100%; 
    height: calc(100vh - var(--header-height)); 
    display: flex;
    justify-content: center;
    align-items: center; 
    overflow: hidden; 
    padding: 20px; 
  }

  .bg-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 1;
    filter: brightness(0.95) contrast(1.1);
  }

  .container-box {
    z-index: 1;
    max-width: 800px; 
    width: 95%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  form {
    background: var(--form-bg);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 30px; 
    width: 100%;
    height: auto;
    box-shadow: 0 0 25px rgba(224, 232, 232, 0.12);
    border: var(--border);
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.7s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  h2 {
    text-align: center;
    color: #ffffff;
    font-size: 24px; 
    font-weight: bold;
    margin-bottom: 20px; 
    text-shadow: 0 0 10px var(--neon-blue); /* Neon glow for header */
  }

  label {
    color: var(--text-color);
    font-size: 15px; 
    margin-bottom: 5px; 
    margin-top: 10px;
  }

  input[type="text"],
  textarea,
  input[type="file"] {
    width: 100%;
    padding: 10px 12px; 
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 15px;
    background: var(--input-bg);
    color: #e6faff;
    border: 1px solid var(--neon-blue); /* Neon border for inputs */
    box-shadow: 0 0 5px rgba(0, 255, 255, 0.2); /* Soft inner glow */
  }

  textarea::placeholder,
  input::placeholder {
    color: #7fbefc;
  }

  textarea {
    min-height: 100px; 
    resize: vertical;
  }

  .btn-group {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 24px; /* Increased margin for better separation */
  }

  /* --- UNIQUE NEON BUTTON STYLES --- */
  .btn {
    flex: 1;
    padding: 14px 20px; /* Increased padding */
    font-size: 16px;
    font-weight: 700;
    color: white;
    
    /* Neon Gradient Background */
    background: linear-gradient(45deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
    
    border: none;
    border-radius: 12px; /* Smoother edges */
    cursor: pointer;
    text-transform: uppercase;
    
    /* Initial Glow and 3D Effect */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6), 0 0 8px var(--neon-blue);
    transform: perspective(1px) translateZ(0); /* Hardware acceleration */
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .btn:hover {
    color: var(--neon-blue); /* Text color changes to neon blue on hover */
    background: #0d1222; /* Dark background on hover */
    
    /* Stronger, mixed glow */
    box-shadow: 
      0 0 10px var(--neon-blue),
      0 0 20px var(--neon-purple),
      0 0 40px var(--neon-blue);
    
    /* Slight scaling */
    transform: scale(1.05); 
    border: 1px solid var(--neon-blue); /* Subtle border appears */
  }

  .btn:active {
    /* Press Effect */
    transform: scale(0.95);
    box-shadow: 
      0 2px 5px rgba(0, 0, 0, 0.8),
      inset 0 0 10px var(--neon-blue); /* Inner neon press effect */
    background: #000;
    color: white;
  }
  /* --- END UNIQUE NEON BUTTON STYLES --- */

  .spinner-wrapper {
    text-align: center;
    margin-top: 25px;
  }

  .loading-spinner {
    border: 6px solid rgba(128, 0, 128, 0.3);
    border-top: 6px solid #00ffff;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    animation: spin 1s linear infinite;
    display: none;
    margin: 0 auto;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* --- MEDIA QUERY for Mobile --- */
  @media screen and (max-width: 768px) {
    .ranking-form-wrapper {
        height: calc(100vh - var(--header-height));
        padding: 15px 10px;
    }
    
    .container-box {
      max-width: none; 
      width: 95%;
    }

    form {
      padding: 20px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 15px;
    }
    
    textarea {
        min-height: 80px;
    }

    .btn-group {
      flex-direction: column;
      gap: 8px;
      margin-top: 15px;
    }

    .btn {
      padding: 10px;
      font-size: 14px;
    }
  }
</style>

<div class="ranking-form-wrapper">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="{{ url_for('static', filename='vv.mp4') }}" type="video/mp4">
  </video>

  <div class="container-box">
    <form id="initialForm" method="post" enctype="multipart/form-data">
      <h2>Initial Patent Relevance Ranking Tool</h2>

      <label for="project_code">Project Code:</label>
      <input type="text" id="project_code" name="project_code" required>

      <label for="abstract">Abstract:</label>
      <textarea name="abstract" id="abstract" placeholder="Paste abstract here..." required></textarea>

      <label for="initial_file">Initial Dataset (.xlsx):</label>
      <input type="file" name="initial_file" id="initial_file" accept=".xlsx" required>

      <div class="btn-group">
        <button type="button" class="btn" onclick="submitTo('patentryx')">Patentryx</button>
        <button type="button" class="btn" onclick="submitTo('prioriq')">PriorIQ</button>
        <button type="button" class="btn" onclick="submitTo('bothranking')">Both</button>
      </div>

      <div class="spinner-wrapper">
        <div id="spinner" class="loading-spinner"></div>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('initial_file').addEventListener('change', function () {
    const file = this.files[0];
    if (file && file.name.endsWith('.xlsx') && file.name.includes('_')) {
      const projectCode = file.name.split('_')[0];
      document.getElementById('project_code').value = projectCode;
    } else {
      alert('Please upload a valid .xlsx file with underscore (_) in the name.');
    }
  });

  async function submitTo(route) {
    const form = document.getElementById('initialForm');
    const formData = new FormData(form);
    const spinner = document.getElementById('spinner');
    spinner.style.display = 'block';

    try {
      const res = await fetch(`/${route}`, {
        method: 'POST',
        body: formData
      });

      const contentType = res.headers.get("content-type");
      spinner.style.display = 'none';

      if (contentType && contentType.includes("application/json")) {
        const data = await res.json();
        if (data.output_zip) {
          const filename = data.output_zip.split('/').pop();
          const link = document.createElement("a");
          link.href = `/download/${filename}`;
          link.setAttribute("download", filename);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          setTimeout(() => {
            alert(`${route} completed successfully.`);
          }, 500);
        } else if (data.error) {
          alert("Server Error: " + data.error);
        }
      } else {
        const text = await res.text();
        alert("Unexpected response:\n" + text);
      }
    } catch (err) {
      spinner.style.display = 'none';
      alert("Request failed: " + err.message);
    }
  }

  document.addEventListener('contextmenu', event => event.preventDefault());
</script>
{% endblock %}
