{% extends "base.html" %}
{% block content %}

<style>
  :root {
    --blue-gradient: linear-gradient(to right, #00c6ff, #0072ff);
    --hover-gradient: linear-gradient(to right, #00f0ff, #00c6ff);
    --glow: 0 0 14px rgba(0, 198, 255, 0.25);
    --form-bg: rgba(8, 12, 24, 0.75);
    --border: 1px solid rgba(0, 255, 255, 0.1);
    --text-color: #cceeff;
    --input-bg: rgba(0, 0, 0, 0.45);
  }

  * {
    user-select: none;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #000;
  }

  ::selection {
    background: transparent;
    color: inherit;
  }

  .ranking-form-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: auto;
    padding: 20px;
  }

  .bg-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 1;
    filter: brightness(0.95) contrast(1.1);
  }

  .container-box {
    z-index: 1;
    width: 1000px;
    max-width: 95%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  form {
    background: var(--form-bg);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    box-shadow: 0 0 25px rgba(224, 232, 232, 0.12);
    border: var(--border);
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.7s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  h2 {
    text-align: center;
    color: #ffffff;
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 32px;
    text-shadow: 0 0 10px #00f0ff;
  }

  label {
    color: var(--text-color);
    font-size: 16px;
    margin-bottom: 8px;
    margin-top: 14px;
  }

  input[type="text"],
  input[type="file"],
  textarea {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 16px;
    background: var(--input-bg);
    color: #e6faff;
    border: 1px solid #1f88ff;
  }

  textarea {
    min-height: 140px;
    resize: vertical;
    overflow-y: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  textarea::-webkit-scrollbar {
    width: 0;
    height: 0;
  }

  textarea::placeholder,
  input::placeholder {
    color: #7fbefc;
  }

  .btn {
    margin-top: 24px;
    padding: 14px;
    font-size: 16px;
    font-weight: bold;
    background: var(--blue-gradient);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: var(--glow);
    transition: all 0.3s ease;
  }

  .btn:hover {
    background: var(--hover-gradient);
    transform: scale(1.03);
    box-shadow: 0 0 18px #00e5ff;
  }

  .spinner-wrapper {
    text-align: center;
    margin-top: 30px;
  }

  .loading-spinner {
    border: 6px solid rgba(128, 0, 128, 0.3);
    border-top: 6px solid #00ffff;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    animation: spin 1s linear infinite;
    display: none;
    margin: 0 auto;
  }

  .btn-group {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  .action-button {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    background: var(--hover-gradient);
    color: white;
    cursor: pointer;
  }

  .action-button:hover {
    background: var(--blue-gradient);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
    color: #fff;
    margin-top: 20px;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
    background-color: rgba(0, 0, 0, 0.5);
  }

  table th,
  table td {
    padding: 10px;
    border: 1px solid #00c6ff;
    text-align: center;
  }

  table th {
    background-color: rgba(0, 198, 255, 0.2);
    color: #00ffff;
    text-shadow: 0 0 6px #00f0ff;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media screen and (max-width: 768px) {
    form {
      padding: 24px;
    }
    h2 {
      font-size: 22px;
    }
    .btn {
      width: 100%;
    }
    .btn-group {
      flex-direction: column;
    }
  }
</style>

<div class="ranking-form-wrapper">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="{{ url_for('static', filename='vv.mp4') }}" type="video/mp4">
  </video>

  <div class="container-box">
    <form id="final-ranking-form" method="post" action="/final" enctype="multipart/form-data">
      <h2>Final Patent Relevance Ranking Tool</h2>

      <label for="project_code">Project Code:</label>
      <input type="text" id="project_code" name="project_code" readonly required>

      <label for="abstract">Abstract:</label>
      <textarea name="abstract" id="abstract" placeholder="Paste abstract here..." required></textarea>

      <label for="initial_file">Initial Dataset (.xlsx):</label>
      <input type="file" name="initial_file" id="initial_file" accept=".xlsx" required>

      <label for="final_file">Final Dataset (.xlsx):</label>
      <input type="file" name="final_file" id="final_file" accept=".xlsx" required>

      <button type="submit" class="btn">EXECUTE</button>

      <div class="spinner-wrapper">
        <div id="spinner" class="loading-spinner"></div>
      </div>
    </form>

    {% if final_table %}
    <div id="output-section" style="width:100%; margin-top: 40px;">
      <h3 style="color: #00e6b8; text-align: center; font-size: 22px;">Final Rank Order Output</h3>
      <div style="overflow-x:auto;">{{ final_table|safe }}</div>

      <div class="btn-group">
        {% if download_token %}
        <form action="/download/{{ download_token }}" method="get">
          <button type="submit" class="action-button" onclick="showForm('download')">Download ZIP</button>
        </form>
        <form action="/push_to_db" method="post"
              onsubmit="return confirm('Are you sure to push output to database?')">
          <input type="hidden" name="project_code" value="{{ project_code }}">
          <button type="submit" class="action-button" onclick="showForm('db')">Push to DB</button>
        </form>
        {% endif %}
      </div>
    </div>
    {% endif %}
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("final-ranking-form");
    const spinner = document.getElementById("spinner");
    const initialInput = document.getElementById("initial_file");
    const finalInput = document.getElementById("final_file");
    const projectCodeField = document.getElementById("project_code");

    let downloadClicked = false;
    let dbPushed = false;

    function extractCodeFromFilename(filename) {
      if (!filename) return '';
      const baseName = filename.split('.')[0];
      const parts = baseName.split('_');
      return parts.length > 0 ? parts[0] : '';
    }

    function updateProjectCode() {
      if (!projectCodeField.value.trim()) {
        const initialFile = initialInput.files[0];
        const finalFile = finalInput.files[0];
        if (initialFile && initialFile.name) {
          projectCodeField.value = extractCodeFromFilename(initialFile.name);
        } else if (finalFile && finalFile.name) {
          projectCodeField.value = extractCodeFromFilename(finalFile.name);
        }
      }
    }

    initialInput.addEventListener("change", updateProjectCode);
    finalInput.addEventListener("change", updateProjectCode);

    {% if final_table %}
      form.style.display = "none";
    {% endif %}

    document.getElementById("final-ranking-form").addEventListener("submit", function () {
      spinner.style.display = "block";
    });

    window.showForm = function (type) {
      if (type === "download") downloadClicked = true;
      if (type === "db") dbPushed = true;
      if (downloadClicked && dbPushed) {
        form.style.display = "flex";
        spinner.style.display = "none";
      }
    };

    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("keydown", function (e) {
      if ((e.ctrlKey || e.metaKey) && ['c', 'x', 'a'].includes(e.key)) {
        e.preventDefault();
      }
    });
  });
</script>

{% endblock %}
