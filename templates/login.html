<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('/static/ano.jpg'); /* Adjust this path */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      color: #333;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.05); /* Almost clear */
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); /* Lighter glow */
      backdrop-filter: blur(6px); /* Keep frosted effect */
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 215, 0, 0.2); /* Subtle golden outline */
      width: 100%;
      max-width: 300px;
      text-align: center;
    }
    

    h1 {
      font-size: 20px;
      color: #fff;
      margin-bottom: 16px;
    }

    form {
      margin-top: 10px;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
      text-align: left;
      color: #fff;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.85);
      color: #333;
    }

    input[type="submit"] {
      background: #ffcc00;
      color: #000;
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s ease;
    }

    input[type="submit"]:hover {
      background: #ffd700;
    }

    p {
      font-size: 12px;
      margin-bottom: 12px;
      color: #fff;
    }

    .error {
      color: red;
      font-size: 13px;
    }

    .success {
      color: lightgreen;
      font-size: 13px;
    }

    .register-link,
    .forgot-link {
      margin-top: 12px;
      font-size: 12px;
    }

    .register-link a,
    .forgot-link a {
      color: #ffcc00;
      text-decoration: none;
      font-weight: bold;
    }

    .register-link a:hover,
    .forgot-link a:hover {
      color: #ffd700;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login</h1>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <p class="{{ category }}">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Error from context -->
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/sign-in">
      <label for="username">Email:</label>
      <input type="text" id="email" name="email" required autocomplete="email" />

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />

      <input type="submit" value="Login" />
    </form>

    <p class="register-link">Don't have an account? <a href="/register">Register here</a>.</p>
    <p class="forgot-link"><a href="/forgot-password">Forgot Password?</a></p>
  </div>
</body>
</html>
